<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obrigado por jogar</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #222, #555);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    .container {
      background: rgba(0,0,0,0.7);
      padding: 40px;
      border-radius: 10px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2em;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #00bfff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    a:hover {
      background: #0099cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Obrigado por jogar!</h1>
    <p>Esperamos que tenha se divertido.</p>
    <a href="index.html">Voltar para o site</a>
  </div>
</body>
</html>
